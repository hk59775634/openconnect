name: Build client packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: ubuntu-latest
    container:
      image: fedora:40
    steps:
      - uses: actions/checkout@v4
      - name: Install MinGW toolchain
        run: |
          dnf install -y mingw64-filesystem mingw64-gcc mingw64-gcc-c++ \
            mingw64-gnutls mingw64-libxml2 mingw64-zlib mingw64-p11-kit \
            mingw64-gettext mingw64-nsis mingw32-nsis mingw-nsis-base \
            automake autoconf libtool pkgconf-pkg-config gettext \
            make git curl jq unzip which zip diffutils perl python3
      - name: Build Windows package
        env:
          OC_VERSION: ${{ github.ref_name }}
          SRC_DIR: ${{ github.workspace }}
          OUT_DIR: ${{ github.workspace }}/dist
          BUILD_DIR: /tmp/win64
          FORCE_COPY: "1"
        run: |
          mkdir -p dist
          bash packaging/build-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/*

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK r27c
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          sudo mkdir -p /opt/android-sdk-linux_x86
          sudo ln -sfn "$ANDROID_HOME/ndk/27.2.12479018" /opt/android-sdk-linux_x86/android-ndk-r27c
      - name: Host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config \
            gettext git curl unzip ant make gcc g++
      - name: Build Android APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK: /opt/android-sdk-linux_x86/android-ndk-r27c
          OUT_DIR: ${{ github.workspace }}/dist
          WORK_DIR: ${{ runner.temp }}/android-build
          ANDROID_ABIS: arm64
        run: |
          mkdir -p dist
          chmod +x packaging/build-android.sh
          packaging/build-android.sh
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/*

  release:
    needs: [windows, android]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect assets
        run: |
          mkdir -p upload
          find artifacts -type f -print -exec cp -a {} upload/ \;
          cd upload
          sha256sum * > SHA256SUMS.clients || true
          ls -lah
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "openconnect-tunnel ${TAG}" \
              --notes "Windows / Android client packages built from openconnect-tunnel."
          gh release upload "$TAG" upload/* --clobber
